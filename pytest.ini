# ===============================
# IKARUS INVENTORY - Configuração de Testes
# ===============================
# 
# Arquivo de configuração para pytest/unittest
# Permite executar testes com diferentes opções
#

[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = .
omit = 
    test_*.py
    venv/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
